<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deployment Test</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f0f4f8;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .check { font-size: 3rem; }
    h1 { margin: 12px 0 8px; color: #1a1a1a; font-size: 1.5rem; }
    p  { color: #555; margin: 0; font-size: 0.95rem; }
    .badge {
      display: inline-block;
      margin-top: 20px;
      background: #e6f4ea;
      color: #2d7a3a;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 4px 14px;
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✅</div>
    <h1>Deployment Successful</h1>
    <p>This page was deployed via GitHub Actions.</p>
    <div class="badge">pipeline passing</div>
  </div>
</body>
</html>
