# .github/workflows/compliance.yml
name: Compliance Checker

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC

jobs:

  # ─────────────────────────────────────────
  # 1. SECRET SCANNING
  # Works on any repo, even empty ones
  # ─────────────────────────────────────────
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────
  # 2. DEPENDENCY VULNERABILITY SCAN
  # Skipped automatically if no lock file found
  # ─────────────────────────────────────────
  dependency-scan:
    name: Dependency Vulnerabilities (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for package lock file
        id: check
        run: |
          if [ -f package-lock.json ] || [ -f yarn.lock ] || [ -f requirements.txt ] || [ -f go.sum ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "No dependency files found — skipping scan."
          fi

      - name: Run Trivy
        if: steps.check.outputs.found == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

  # ─────────────────────────────────────────
  # 3. IaC MISCONFIGURATION SCAN
  # soft_fail: true so it warns but won't block
  # an empty repo — flip to false once you have infra
  # ─────────────────────────────────────────
  iac-scan:
    name: IaC Scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          soft_fail: true       # ← change to false once you have Terraform/K8s files
          output_format: cli

  # ─────────────────────────────────────────
  # 4. SBOM GENERATION
  # Always works — generates a bill of materials
  # even for a repo with just config files
  # ─────────────────────────────────────────
  sbom:
    name: Generate SBOM (Syft)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  # ─────────────────────────────────────────
  # SUMMARY — add these back as you add code:
  #   - license-check  (needs package.json)
  #   - sast/CodeQL    (needs source code)
  # ─────────────────────────────────────────
  report:
    name: Compliance Summary
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-scan, iac-scan, sbom]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "## Compliance Check Results" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scanning  | ${{ needs.secret-scan.result }}    |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan  | ${{ needs.dependency-scan.result }}|" >> $GITHUB_STEP_SUMMARY
          echo "| IaC Scan         | ${{ needs.iac-scan.result }}       |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM Generated   | ${{ needs.sbom.result }}           |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ License check and SAST are disabled until source code is added." >> $GITHUB_STEP_SUMMARY

      - name: Fail if any critical check failed
        if: |
          needs.secret-scan.result == 'failure' ||
          needs.dependency-scan.result == 'failure'
        run: |
          echo "One or more compliance checks failed."
          exit 1
